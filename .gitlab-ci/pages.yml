pages:
  stage: deploy
  image: gcc:latest
  needs: [ build ]

  before_script:
    - apt-get update && apt-get install -y cmake doxygen
    - cmake --build build --target docs

  script:
    - mkdir -p public
    - cp -r build/docs/html/* public/

  artifacts:
    paths:
      - public
  only:
    - main