pages:
  stage: deploy
  image: gcc:latest
  before_script:
    - apt-get update && apt-get install -y cmake doxygen

  script:
    - cmake -S docs -B build_docs
    - cmake --build build_docs --target docs
    - mkdir -p public
    - cp -r build_docs/docs/html/* public/

  artifacts:
    paths:
      - public
  only:
    - main